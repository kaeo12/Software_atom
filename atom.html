<!DOCTYPE html>
<html>
<head>
<title>Atom</title>
<style>
.atom {
  position: relative;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  border: 2px solid black;
}

.nucleus {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background-color: lightgray;
}

.proton {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background-color: red;
  text-align: center;
  line-height: 20px;
}

.neutron {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background-color: blue;
  text-align: center;
  line-height: 20px;
}

.electron-shell {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  animation: rotate 10s linear infinite;
}

.electron {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background-color: yellow;
  text-align: center;
  line-height: 20px;
}

@keyframes rotate {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}
</style>
</head>
<body>

<div class="atom">
  <div class="nucleus-shell">
    <div class="nucleus">
      <div class="neutron">Neutron</div>
      <div class="neutron">Neutron</div>
    </div>
  </div>
  <div class="electron-shell">
    <div class="electron">Electron</div>
  </div>
</div>

</body>
</html>
